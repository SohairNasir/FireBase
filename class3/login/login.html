<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Welcome Back</title>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="login.css">
</head>
<body>

    <div class="form login-box">
        <h3 class="heading tracking-in-expand-fwd-bottom">Welcome Back</h3>
        <p class="sub-heading">Please enter your details to login</p>
        
        <form id="login-form" class="content">
            <div class="all-inputs-parent">
                
                <div class="field input">
                    <label for="email">Email Address</label>
                    <input class="all-inputs" id="email" type="email" placeholder="Enter your email" required/>
                    <p class="Error-filed"></p>
                </div>

                <div class="field input">
                    <label for="password">Password</label>
                    <div class="password-wrapper">
                        <input id="password" type="password" placeholder="Enter your password" class="all-inputs" required/>
                        <i class='bx bx-hide hide-show' id="togglePassword"></i>
                    </div>
                    <p class="Error-filed"></p>
                </div>
                
            </div>

            <div class="form-options">
                <a href="#" class="forget">Forgot Password?</a>
            </div>

            <div class="field btn">
                <button id="login-btn" type="submit">Log In </button>
            </div>

            <div class="link sign-login">
                <span>Don't have an account?</span>
                <a href="../signup/signup.html" class="register-link">Sign Up</a>
            </div>

            <div class="line-separator"><span>OR</span></div>

            <div class="social-container">
                <div class="thirdLogin field google">
                    <i class='bx bxl-google face-icon'></i>
                    <span>Login with Google</span>
                </div>
                <div class="thirdLogin field facebook">
                    <i class='bx bxl-facebook-circle face-icon'></i>
                    <span>Login with Facebook</span>
                </div>
            </div>

        </form>
    </div>

    <script src="login.js" type="module"></script>
</body>
</html>
